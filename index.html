<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>SpaseX</title>
  </head>
  <body class="d-flex flex-column min-vh-100">
    <header>
      <div class="container text-center">
        <div class="row">
          <div class="col-12 col-sm-2 col-md-2 bg-info">LOGO</div>
          <div class="col-7 col-sm-6 col-md-7 bg-primary">TOP-NAV</div>
          <div class="col-5 col-sm-4 col-md-3 bg-info">SOCIAL</div>
        </div>
      </div>
    </header>
    <main class="flex-grow-1">
      <div class="container text-center">
        <div class="row">
          <div class="col-12 col-md-6 bg-secondary">HERO</div>
          <div class="col-12 col-md-3 bg-success">ACTION</div>
          <div class="col-12 col-sm-8 col-md-3 bg-info order-md-1">LEFT</div>
          <div class="col-12 col-sm-4 col-md-3 col-lg-3 bg-danger order-md-0">
            AD
          </div>
          <div class="col-12 col-md-6 bg-primary order-md-2">ARCTICLE</div>
          <div class="col-12 col-md-3 bg-warning order-md-3">RIGHT</div>
        </div>
      </div>
    </main>
    <footer class="container text-center">
      <div class="row">
        <div class="col bg-secondary">FOOTER</div>
      </div>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
